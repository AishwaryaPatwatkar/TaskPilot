name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ── Job 2: Test ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskpilot
          POSTGRES_PASSWORD: taskpilot
          POSTGRES_DB: taskpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@localhost:5432/taskpilot_test
      DATABASE_URL_SYNC: postgresql+psycopg2://taskpilot:taskpilot@localhost:5432/taskpilot_test
      TEST_DATABASE_URL: postgresql+asyncpg://taskpilot:taskpilot@localhost:5432/taskpilot_test
      TEST_DATABASE_URL_SYNC: postgresql+psycopg2://taskpilot:taskpilot@localhost:5432/taskpilot_test
      BASIC_AUTH_USERNAME: admin
      BASIC_AUTH_PASSWORD: changeme

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Build Docker image ────────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false   # set to true and add registry secrets to deploy
          tags: taskpilot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
