[alembic]
script_location = alembic
prepend_sys_path = .

# The actual URL is always injected by alembic/env.py via os.getenv("DATABASE_URL_SYNC").
# This value is a safe placeholder so configparser does not error on startup.
sqlalchemy.url = postgresql+psycopg2://placeholder/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
