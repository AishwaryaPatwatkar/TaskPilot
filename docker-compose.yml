services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskpilot}
      POSTGRES_DB: ${POSTGRES_DB:-taskpilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # host:container — avoids conflict with a local Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"  # host:container — change host side if 8001 is also taken
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-taskpilot}:${POSTGRES_PASSWORD:-taskpilot}@db:5432/${POSTGRES_DB:-taskpilot}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-taskpilot}:${POSTGRES_PASSWORD:-taskpilot}@db:5432/${POSTGRES_DB:-taskpilot}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-changeme}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-60}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002}

volumes:
  postgres_data:
